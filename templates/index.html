<!DOCTYPE html>
<html>
<head>
    <title>🎲 D&D Мастер | Подземелье</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cinema', 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(60,30,20,0.4) 0px, rgba(60,30,20,0.4) 2px, transparent 2px, transparent 10px),
                repeating-linear-gradient(-45deg, rgba(40,20,10,0.3) 0px, rgba(40,20,10,0.3) 2px, transparent 2px, transparent 12px);
            pointer-events: none;
            z-index: 0;
        }
        
        .torch {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 100px;
            height: 150px;
            background: radial-gradient(ellipse at center, rgba(255,100,0,0.6) 0%, rgba(255,50,0,0.2) 50%, transparent 70%);
            border-radius: 50%;
            filter: blur(15px);
            animation: flicker 0.3s infinite alternate;
            pointer-events: none;
            z-index: 1;
        }
        
        .torch-right { left: auto; right: 20px; }
        .torch-top-left { top: 20px; left: 20px; bottom: auto; width: 80px; height: 120px; }
        .torch-top-right { top: 20px; right: 20px; left: auto; bottom: auto; width: 80px; height: 120px; }
        
        @keyframes flicker {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.08); }
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        
        h1 {
            text-align: center;
            color: #d4af37;
            text-shadow: 0 0 15px rgba(212,175,55,0.6);
            font-size: 2.2em;
            letter-spacing: 6px;
            margin-bottom: 20px;
            border-bottom: 3px solid #8b4513;
            display: inline-block;
            padding: 0 40px 12px 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 0 0 30px 30px;
        }
        
        .header { text-align: center; }
        
        .chat {
            background: rgba(10,5,3,0.88);
            border: 2px solid #8b4513;
            border-radius: 20px;
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }
        
        .user-msg {
            background: linear-gradient(135deg, #2a1a0a, #1a0a00);
            border-left: 4px solid #d4af37;
            margin: 12px 0;
            padding: 12px 18px;
            border-radius: 12px;
            text-align: right;
            color: #e0c080;
        }
        
        .master-msg {
            background: linear-gradient(135deg, #1a0a05, #0a0500);
            border-right: 4px solid #8b0000;
            margin: 12px 0;
            padding: 12px 18px;
            border-radius: 12px;
            color: #c0a070;
        }
        
        .summary-msg, .image-msg {
            background: linear-gradient(135deg, #2a2a0a, #1a1a00);
            border-right: 4px solid #d4af37;
            margin: 12px 0;
            padding: 12px 18px;
            border-radius: 12px;
            color: #e0d080;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        input {
            flex: 1;
            padding: 14px;
            background: #1a0a05;
            border: 2px solid #8b4513;
            border-radius: 12px;
            color: #e0c080;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 12px rgba(212,175,55,0.3);
        }
        
        button {
            padding: 14px 20px;
            background: linear-gradient(135deg, #3a1a0a, #2a0a00);
            border: 2px solid #8b4513;
            border-radius: 12px;
            color: #d4af37;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        
        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #5a2a10, #3a1a0a);
            border-color: #d4af37;
            transform: scale(1.02);
        }
        
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .dice-btn {
            background: linear-gradient(135deg, #4a2a0a, #3a1a00);
            border-color: #ffaa00;
            color: #ffcc44;
        }
        
        .summary-btn {
            background: linear-gradient(135deg, #2a3a0a, #1a2a00);
            border-color: #88cc44;
            color: #aaff88;
        }
        
        .image-btn {
            background: linear-gradient(135deg, #3a0a2a, #2a001a);
            border-color: #cc44aa;
            color: #ff88cc;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #2a0a0a, #1a0000);
            border-color: #8b0000;
            color: #cc8866;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        
        .waiting-roll {
            background: rgba(139,69,19,0.4);
            border: 1px solid #ffaa00;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 12px;
            color: #ffaa66;
            animation: glow 1s infinite alternate;
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 5px rgba(255,170,0,0.3); }
            to { box-shadow: 0 0 15px rgba(255,170,0,0.6); }
        }
        
        .status {
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border-radius: 10px;
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            color: #8b7355;
        }
        
        .temp-message {
            background: rgba(212,175,55,0.15);
            border: 1px solid #d4af37;
            margin: 8px;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            color: #d4af37;
            animation: fadeOut 3s forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        .scroll-decoration {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #4a2a1a;
            z-index: 1;
            white-space: nowrap;
        }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1a0a05; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #8b4513; border-radius: 10px; }
        
        .image-caption {
            font-size: 11px;
            color: #aa8866;
            margin-top: 5px;
            text-align: center;
        }
        
        .generated-image img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .generated-image img:hover {
            transform: scale(1.02);
        }
        
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="torch"></div>
    <div class="torch torch-right"></div>
    <div class="torch torch-top-left"></div>
    <div class="torch torch-top-right"></div>
    
    <div class="container">
        <div class="header">
            <h1>⚔️ D&D МАСТЕР ⚔️</h1>
        </div>
        
        <div class="chat" id="chat"></div>
        
        <div class="input-area">
            <input type="text" id="message" placeholder="Опишите ваше действие..." autofocus>
            <button id="sendBtn" onclick="sendMessage()">📜 ОТПРАВИТЬ</button>
            <button class="dice-btn" id="diceBtn" onclick="rollDice()">🎲 БРОСИТЬ</button>
        </div>
        
        <div class="button-group">
            <button class="summary-btn" id="summaryBtn" onclick="getSummary()" style="flex:1;">📖 ПЕРЕСКАЗ</button>
            <button class="image-btn" id="imageBtn" onclick="generateImage()" style="flex:1;">🎨 ИЗОБРАЖЕНИЕ</button>
            <button class="restart-btn" onclick="restartGame()" style="flex:1;">🔄 ЗАНОВО</button>
        </div>
        
        <div id="waitingMessage" class="waiting-roll" style="display: none;">
            🔥 МАСТЕР ЖДЁТ БРОСОК! НАЖМИТЕ "БРОСИТЬ" 🔥
        </div>
        <div id="status" class="status">✨ Готов к приключению</div>
        <div class="scroll-decoration">🎲 Да покровительствуют вам боги подземелий 🎲</div>
    </div>
    
    <script>
    async function loadHistory() {
        try {
            const res = await fetch('/history');
            const data = await res.json();
            const history = data.history;
            const waiting = data.waiting_for_roll;
            
            const chat = document.getElementById('chat');
            chat.innerHTML = '';
            
            for (const msg of history) {
                let div;
                
                // Проверяем, есть ли image_id (изображение)
                if (msg.image_id) {
                    div = document.createElement('div');
                    div.className = 'image-msg';
                    div.innerHTML = `<strong>🎨 МАСТЕР:</strong><br>${msg.text.replace(/\n/g, '<br>')}<br>
                        <img src="/image/${msg.image_id}" alt="Сгенерированная сцена" 
                             style="max-width:100%; border-radius:10px; margin-top:10px; box-shadow:0 0 15px rgba(0,0,0,0.5); cursor:pointer;" 
                             onclick="window.open(this.src)">
                        <div class="image-caption">🎨 Нажмите на изображение для увеличения</div>`;
                }
                else if (msg.text && msg.text.includes("КРАТКИЙ ПЕРЕСКАЗ")) {
                    div = document.createElement('div');
                    div.className = 'summary-msg';
                    div.innerHTML = `<strong>🏰 МАСТЕР:</strong><br>${msg.text.replace(/\n/g, '<br>')}`;
                }
                else {
                    div = document.createElement('div');
                    div.className = msg.role === 'user' ? 'user-msg' : 'master-msg';
                    div.innerHTML = `<strong>${msg.role === 'user' ? '⚔️ ВЫ' : '🏰 МАСТЕР'}:</strong><br>${msg.text.replace(/\n/g, '<br>')}`;
                }
                chat.appendChild(div);
            }
            chat.scrollTop = chat.scrollHeight;
            
            updateUI(waiting);
            
        } catch(e) { console.error(e); }
    }
    
    async function getSummary() {
        const btn = document.getElementById('summaryBtn');
        btn.disabled = true;
        btn.textContent = '⏳ ГЕНЕРАЦИЯ...';
        
        try {
            const res = await fetch('/summary');
            await loadHistory();
            showTempMsg('📖 Пересказ истории добавлен в чат');
        } catch(e) { console.error(e); }
        finally {
            btn.disabled = false;
            btn.textContent = '📖 ПЕРЕСКАЗ';
        }
    }
    
    async function generateImage() {
        const btn = document.getElementById('imageBtn');
        btn.disabled = true;
        btn.textContent = '🎨 ГЕНЕРАЦИЯ...';
        
        try {
            showTempMsg('🎨 Генерирую изображение на основе истории... Это может занять до 30 секунд');
            const res = await fetch('/generate_image');
            const data = await res.json();
            
            if (data.error) {
                showTempMsg('❌ Ошибка генерации изображения');
            } else {
                await loadHistory();
                showTempMsg('🎨 Изображение добавлено в чат!');
            }
        } catch(e) { 
            console.error(e);
            showTempMsg('❌ Ошибка генерации изображения');
        }
        finally {
            btn.disabled = false;
            btn.textContent = '🎨 ИЗОБРАЖЕНИЕ';
        }
    }
    
    function updateUI(waiting) {
        const input = document.getElementById('message');
        const sendBtn = document.getElementById('sendBtn');
        const diceBtn = document.getElementById('diceBtn');
        const waitingDiv = document.getElementById('waitingMessage');
        const statusDiv = document.getElementById('status');
        
        if (waiting) {
            input.disabled = true;
            sendBtn.disabled = true;
            diceBtn.disabled = false;
            waitingDiv.style.display = 'block';
            statusDiv.innerHTML = '⏳ Мастер ждёт бросок! Нажмите "БРОСИТЬ"';
            statusDiv.style.color = '#ffaa66';
        } else {
            input.disabled = false;
            sendBtn.disabled = false;
            diceBtn.disabled = false;
            waitingDiv.style.display = 'none';
            statusDiv.innerHTML = '✨ Готов к действию';
            statusDiv.style.color = '#8b7355';
            input.focus();
        }
    }
    
    async function rollDice() {
        try {
            const rollRes = await fetch('/roll', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({dice: 'd20'})
            });
            const rollData = await rollRes.json();
            
            showTempMsg(`🎲 ${rollData.description}`);
            
            await fetch('/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: "", dice_result: rollData.total})
            });
            
            await loadHistory();
            
        } catch(e) { console.error(e); }
    }
    
    async function sendMessage() {
        const input = document.getElementById('message');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        
        try {
            await fetch('/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg, dice_result: null})
            });
            await loadHistory();
            
        } catch(e) { console.error(e); }
    }
    
    async function restartGame() {
        await fetch('/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: "!начать заново", dice_result: null})
        });
        await loadHistory();
        showTempMsg('🔄 Игра перезапущена');
    }
    
    function showTempMsg(msg) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'temp-message';
        div.innerHTML = msg;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        setTimeout(() => {
            if (div.parentNode) div.remove();
        }, 3000);
    }
    
    document.getElementById('message').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled) sendMessage();
    });
    
    loadHistory();
</script>
</body>
</html>
